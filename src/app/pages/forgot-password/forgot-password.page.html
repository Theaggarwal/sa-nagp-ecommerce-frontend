<section class="auth-shell">
  <article class="auth-card">
    <p class="eyebrow">Account recovery</p>
    <h1>Reset Password</h1>
    <p class="supporting">Enter your registered email to start the secure reset flow.</p>

    <form (ngSubmit)="resetPassword()" class="auth-form">
      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        placeholder="name@company.com"
        required
      />

      <button type="submit" class="btn btn-sec-col">Send reset link</button>
    </form>

    <a routerLink="/login" class="action-link">Back to sign in</a>
  </article>
</section>

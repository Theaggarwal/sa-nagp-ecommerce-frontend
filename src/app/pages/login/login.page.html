<section class="auth-wrap">
  <div class="ambient-shape"></div>

  <article class="auth-card">
    <p class="eyebrow">Azure Entra ID B2C</p>
    <h1>Welcome back</h1>
    <p class="supporting">Sign in with your account, Facebook, or Twitter.</p>

    <form (ngSubmit)="signInWithCredentials()" class="auth-form">
      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        [(ngModel)]="email"
        placeholder="name@company.com"
        required
      />

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        [(ngModel)]="password"
        placeholder="Enter your password"
        required
      />

      <button class="btn btn-primary" type="submit">Sign In</button>
    </form>

    <div class="separator"><span>or continue with</span></div>

    <div class="social-buttons">
      <button class="btn btn-facebook" type="button" (click)="signInWithFacebook()">
        Continue with Facebook
      </button>
      <button class="btn btn-twitter" type="button" (click)="signInWithTwitter()">
        Continue with Twitter
      </button>
    </div>

    <div class="footer-actions">
      <a routerLink="/register" class="action-link">Register</a>
      <a routerLink="/forgot-password" class="action-link">Forgot password?</a>
    </div>
  </article>
</section>

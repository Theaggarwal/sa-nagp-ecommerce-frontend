<section class="auth-shell">
  <article class="auth-card">
    <p class="eyebrow">Create account</p>
    <h1>Join Shop+</h1>
    <p class="supporting">Create your profile and start your ecommerce journey.</p>

    <form (ngSubmit)="register()" class="auth-form">
      <label for="firstName">First name</label>
      <input id="firstName" name="firstName" [(ngModel)]="firstName" required />

      <label for="lastName">Last name</label>
      <input id="lastName" name="lastName" [(ngModel)]="lastName" required />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" [(ngModel)]="email" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" [(ngModel)]="password" required />

      <label for="confirmPassword">Confirm password</label>
      <input
        id="confirmPassword"
        name="confirmPassword"
        type="password"
        [(ngModel)]="confirmPassword"
        required
      />

      <button type="submit" class="btn btn-sec-col">Register</button>
    </form>

    <a routerLink="/login" class="action-link">Back to sign in</a>
  </article>
</section>
